name: CI

on:
  push:
    branches: [main, task-1, task-2, task-3, task-4]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas numpy matplotlib seaborn nltk scikit-learn pytest
      - name: Run tests
        run: pytest tests/ -v
